<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - GRABZ</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-top">
            <div class="container">
                <div class="header-content">
                    <div class="logo">
                        <i class="fas fa-shopping-bag"></i>
                        <span>GRABZ</span>
                    </div>
                    
                    <div class="search-container">
                        <input type="text" placeholder="Search for products..." class="search-input">
                        <i class="fas fa-search"></i>
                    </div>
                    
                    <div class="header-actions">
                        <div class="location">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>Select Campus</span>
                        </div>
                        <div class="cart-icon">
                            <i class="fas fa-shopping-cart"></i>
                            <span class="cart-count">0</span>
                        </div>
                        <div class="account-icon">
                            <i class="fas fa-user"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Orders Header -->
            <div class="orders-header">
                <h1>My Orders</h1>
                <div class="orders-filter">
                    <button onclick="filterOrders('all')">All</button>
                    <button onclick="filterOrders('processing')">Processing</button>
                    <button onclick="filterOrders('delivered')">Delivered</button>
                    <button onclick="filterOrders('cancelled')">Cancelled</button>
                </div>
            </div>

            <!-- Orders Container -->
            <div id="ordersContainer">
                <!-- Orders will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Shopping Cart Sidebar -->
    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-cart">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="cart-items" id="cartItems">
            <p class="empty-cart">Your cart is empty</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">₹0</span>
            </div>
            <button class="checkout-btn">Checkout</button>
        </div>
    </aside>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cartOverlay"></div>

    <script src="../assets/js/products.js"></script>
    <script src="../assets/js/cart.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/orders.js"></script>
</body>
</html>
